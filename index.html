<!DOCTYPE html>
<html lang="en">
<head>

<title>Cape Cod Canal — Vessel Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#f4f6f9;color:#1a1f2e}
#dash{max-width:1200px;margin:20px auto;border-radius:16px;overflow:hidden;border:1px solid #e2e6ef}
.topbar{background:#fff;border-bottom:1px solid #e2e6ef;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-icon{width:30px;height:30px;background:#e8f0fd;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar-title{font-size:14px;font-weight:600}
.topbar-sub{font-size:11px;color:#8892a4;margin-top:1px}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:#8892a4;background:#f4f6f9;border:1px solid #e2e6ef;border-radius:99px;padding:3px 10px}
.dot{width:6px;height:6px;border-radius:50%;background:#c8cdd8;flex-shrink:0}
.dot.live{background:#22c55e;animation:pulse 2s infinite}
.dot.connecting{background:#3b82f6;animation:pulse 1s infinite}
.dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:#e2e6ef;border-bottom:1px solid #e2e6ef}
.stat{background:#fff;padding:12px 16px}
.stat-label{font-size:10px;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.stat-value{font-size:20px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:#8892a4;margin-top:3px}
.flood{color:#2563eb}.ebb{color:#ea580c}.slack{color:#64748b}
.chart-wrap{background:#fff;border-bottom:1px solid #e2e6ef;padding:10px 16px 8px}
.chart-label{font-size:10px;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
#tide-chart{width:100%;height:56px;display:block}
.body{background:#f4f6f9}
#map{height:560px;z-index:0}
.side{background:#fff;border-left:1px solid #e2e6ef;display:flex;flex-direction:column}
.side-header{padding:12px 14px;border-bottom:1px solid #e2e6ef;background:#f8fafc}
.side-eyebrow{font-size:10px;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.side-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-body{padding:10px 14px;flex:1}
.side-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f2f7;font-size:12px}
.side-row:last-child{border-bottom:none}
.side-label{color:#8892a4}.side-val{font-weight:500;text-align:right}
.mt-link{display:block;margin:0 14px 12px;font-size:11px;color:#2563eb;text-decoration:none;text-align:center;padding:6px;border:1px solid #bfdbfe;border-radius:8px;background:#eff6ff}

.pin-note{padding:6px 14px 10px;font-size:10px;color:#b0b8c8}
.vlist{border-top:1px solid #e2e6ef;background:#fff}
.vlist-header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid #f0f2f7}
.vlist-title{font-size:10px;font-weight:600;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em}
.vlist-sub{font-size:11px;color:#b0b8c8}
.vlist-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:#e2e6ef}
.vc{background:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.vc:hover{background:#f8fafc}.vc.nearest{background:#eff6ff}
.vc-icon{font-size:17px;flex-shrink:0}
.vc-info{flex:1;min-width:0}
.vc-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc-meta{font-size:10px;color:#8892a4;margin-top:1px}
.vc-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.badge{font-size:9px;padding:2px 6px;border-radius:99px;white-space:nowrap;font-weight:500}
.badge-cargo{background:#dbeafe;color:#1e40af}.badge-tanker{background:#ffedd5;color:#9a3412}
.badge-passenger{background:#dcfce7;color:#166534}.badge-tug{background:#fef9c3;color:#854d0e}
.badge-sail{background:#ede9fe;color:#5b21b6}.badge-other{background:#f1f5f9;color:#475569}
.badge-speed{background:#f4f6f9;color:#8892a4;border:1px solid #e2e6ef}.badge-nearest{background:#dbeafe;color:#1e40af}
.empty{font-size:12px;color:#b0b8c8;padding:16px;text-align:center}
.leaflet-tooltip{background:white;border:1px solid #e2e6ef;border-radius:8px;padding:6px 10px;font-family:'Inter',sans-serif;font-size:12px;color:#1a1f2e;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.leaflet-tooltip b{font-weight:600;display:block;margin-bottom:2px}
.debug{background:#1e1e2e;color:#a6e3a1;font-family:monospace;font-size:10px;padding:8px 12px;max-height:160px;overflow-y:auto;border-top:1px solid #e2e6ef;display:none}
.debug.open{display:block}
.footer{background:#fff;border-top:1px solid #e2e6ef;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.footer-links{display:flex;gap:12px;font-size:10px;color:#b0b8c8;flex:1;flex-wrap:wrap}
.footer-links a{color:#6b9fd4;text-decoration:none}

/* Mobile optimizations */
@media (max-width: 768px) {
  #dash { margin: 0; border-radius: 0; border: none; }
  .topbar { padding: 10px 14px; }
  .topbar-title { font-size: 13px; }
  .stat-row { grid-template-columns: repeat(2, minmax(0,1fr)); }

  #map { height: 50vh; }
  .side {
    border-left: none;
    border-top: 1px solid #e2e6ef;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .side-header { grid-column: 1 / -1; }
  .side-body { grid-column: 1 / 2; }
  .mt-link { grid-column: 1 / 2; }
  .pin-note { grid-column: 2 / 3; grid-row: 2 / 4; align-self: center; padding: 10px; }
  .vlist-items { grid-template-columns: 1fr; }
  .footer { padding: 8px 14px; }
  .footer-links { gap: 8px; font-size: 10px; }
  #dash { border-radius: 0; }
  .chart-wrap { padding: 8px 14px 6px; }
}
@media (max-width: 480px) {
  .stat-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .stat { padding: 10px 12px; }
  .stat-value { font-size: 16px; }
  #map { height: 45vh; }
  .side { display: block; }

<span style="font-size:11px;color:#8892a4">Cape Cod Canal</span>

<script type="text/javascript">
    var width="100%";
    var height="560";
    var latitude="41.7445";

</script>

<script>
const PIN  = {lat:41.735121, lon:-70.626588};
const NOAA = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter';
const TIDE_ST='8447173';
const TODAY=(()=>{const d=new Date();return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;})();







function vtype(v){return VTYPES.find(t=>t.type===v.type)||VTYPES[5];}















async function loadNWS(){
  try{
    // Step 1: get grid point
    const ptRes = await fetch('https://api.weather.gov/points/41.7351,-70.6266', {
      headers: {'User-Agent': 'CapeCodeCanalTracker/1.0'}
    });
    const ptData = await ptRes.json();
    const forecastHourlyUrl = ptData.properties.forecastHourly;
    const forecastUrl = ptData.properties.forecast;

    // Step 2: fetch both forecasts in parallel
    const [hourlyRes, forecastRes] = await Promise.all([
      fetch(forecastHourlyUrl, {headers:{'User-Agent':'CapeCodeCanalTracker/1.0'}}),
      fetch(forecastUrl, {headers:{'User-Agent':'CapeCodeCanalTracker/1.0'}})
    ]);
    const hourlyData = await hourlyRes.json();
    const forecastData = await forecastRes.json();

    // Wind from first hourly period
    const hour = hourlyData.properties.periods[0];
    const windSpd = hour.windSpeed; // e.g. "12 mph"
    const windDir = hour.windDirection; // e.g. "SW"
    // Convert mph to knots
    const mph = parseFloat(windSpd);
    const kts = isNaN(mph) ? windSpd : `${(mph * 0.868976).toFixed(0)} kn`;
    document.getElementById('wind-val').textContent = `${windDir} ${kts}`;
    document.getElementById('wind-sub').textContent = 'NWS · Bourne MA';

    // Weather from first forecast period
    const period = forecastData.properties.periods[0];
    const temp = period.temperature;
    const short = period.shortForecast;
    document.getElementById('wx-val').textContent = `${temp}°F`;
    document.getElementById('wx-sub').textContent = short;

  } catch(e){
    document.getElementById('wind-val').textContent = '—';
    document.getElementById('wind-sub').textContent = 'unavailable';
    document.getElementById('wx-val').textContent = '—';
    document.getElementById('wx-sub').textContent = 'unavailable';
  }
}


async function loadTides(){
  try{
    const[cRes,hRes]=await Promise.all([
      fetch(`${NOAA}?station=${TIDE_ST}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=6&units=english&application=ccc&format=json&begin_date=${TODAY}&end_date=${TODAY}`),
      fetch(`${NOAA}?station=${TIDE_ST}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=ccc&format=json&begin_date=${TODAY}&end_date=${TODAY}`)
    ]);
    const cData=await cRes.json(), hData=await hRes.json();
    const pts=cData?.predictions||[];
    if(pts.length)drawTideChart(pts); else drawFallbackChart();
    updateTideCard(hData?.predictions||[]);
  }catch(e){drawFallbackChart();}
}

async function loadCurrents(){
  // Use the same 6-min tide predictions to interpolate current height
  try{
    const res=await fetch(`${NOAA}?station=${TIDE_ST}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=6&units=english&application=ccc&format=json&begin_date=${TODAY}&end_date=${TODAY}`);
    const data=await res.json();
    updateCurrentCard(data?.predictions||[]);
  }catch(e){}
}

function updateTideCard(hilo){
  if(!hilo.length)return;
  const now=new Date();
  const next=hilo.find(p=>new Date(p.t)>now)||hilo[hilo.length-1];
  const isHigh=next.type==='H'||next.type==='HH';
  const ts=new Date(next.t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  document.getElementById('tide-next').innerHTML=`<span class="${isHigh?'flood':'ebb'}">${isHigh?'▲':'▼'} ${parseFloat(next.v).toFixed(1)} ft</span>`;
  document.getElementById('tide-sub').textContent=`${isHigh?'High':'Low'} at ${ts}`;
}

function updateCurrentCard(pts){
  // pts = 6-minute tide predictions; interpolate to find height right now
  if(!pts.length)return;
  const now=new Date();
  const sorted=pts.slice().sort((a,b)=>new Date(a.t)-new Date(b.t));
  const before=sorted.filter(p=>new Date(p.t)<=now);
  const after=sorted.filter(p=>new Date(p.t)>now);
  let ht;
  if(before.length&&after.length){
    const p1=before[before.length-1], p2=after[0];
    const t1=new Date(p1.t), t2=new Date(p2.t);
    const frac=(now-t1)/(t2-t1);
    ht=parseFloat(p1.v)+(parseFloat(p2.v)-parseFloat(p1.v))*frac;
  } else if(before.length){
    ht=parseFloat(before[before.length-1].v);
  } else {
    ht=parseFloat(after[0].v);
  }
  const isHigh=ht>3.5; // rough threshold
  document.getElementById('current-val').innerHTML=`<span class="${isHigh?'flood':'ebb'}">${ht.toFixed(1)} ft</span>`;
  document.getElementById('current-sub').textContent='current height';
  // Update every minute
  setTimeout(()=>updateCurrentCard(pts), 60000);
}

function drawTideChart(points){
  _tidePoints = points;
  const canvas=document.getElementById('tide-chart');
  const W=canvas.parentElement.clientWidth-32||800, H=56;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const vals=points.map(p=>parseFloat(p.v));
  const times=points.map(p=>new Date(p.t));
  const minV=Math.min(...vals), maxV=Math.max(...vals), range=maxV-minV||1;
  const pad={t:4,b:14,l:24,r:4};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const xOf=i=>pad.l+(i/(points.length-1))*cw;
  const yOf=v=>pad.t+ch-((v-minV)/range)*ch;
  ctx.beginPath(); ctx.moveTo(xOf(0),yOf(vals[0])); vals.forEach((v,i)=>{if(i>0)ctx.lineTo(xOf(i),yOf(v));});
  ctx.lineTo(xOf(vals.length-1),H-pad.b); ctx.lineTo(xOf(0),H-pad.b); ctx.closePath();
  ctx.fillStyle='rgba(37,99,235,0.07)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(xOf(0),yOf(vals[0])); vals.forEach((v,i)=>{if(i>0)ctx.lineTo(xOf(i),yOf(v));});
  ctx.strokeStyle='#2563eb'; ctx.lineWidth=1.5; ctx.stroke();
  const now=new Date(), start=times[0], end=times[times.length-1];
  const nx=pad.l+Math.max(0,Math.min(1,(now-start)/(end-start)))*cw;
  ctx.beginPath(); ctx.moveTo(nx,pad.t); ctx.lineTo(nx,H-pad.b);
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=1; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='rgba(136,146,164,0.8)'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='center';
  [{h:0,l:'12a'},{h:6,l:'6a'},{h:12,l:'12p'},{h:18,l:'6p'},{h:24,l:'12a'}].forEach(({h,l})=>ctx.fillText(l,pad.l+(h/24)*cw,H-2));
  ctx.textAlign='right'; ctx.fillText(maxV.toFixed(1),pad.l-2,pad.t+8); ctx.fillText(minV.toFixed(1),pad.l-2,H-pad.b);

  // Click/touch to read tide height at that hour
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const frac = Math.max(0, Math.min(1, (x - pad.l) / cw));
    const idx = Math.round(frac * (points.length - 1));
    const pt = points[idx];
    if (!pt) return;
    const t = new Date(pt.t);
    const timeStr = t.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
    const ht = parseFloat(pt.v).toFixed(1);
    document.getElementById('tide-readout').textContent = `${timeStr} → ${ht} ft`;
    // Draw a vertical indicator line
    drawTideChart(_tidePoints);
    const nx2 = pad.l + frac * cw;
    ctx.beginPath(); ctx.moveTo(nx2, pad.t); ctx.lineTo(nx2, H - pad.b);
    ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 1.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(nx2, yOf(parseFloat(pt.v)), 3, 0, Math.PI*2);
    ctx.fillStyle = '#2563eb'; ctx.fill();
  };
}

function drawFallbackChart(){
  const pts=Array.from({length:241},(_,i)=>({t:new Date(new Date().setHours(0,i*6,0,0)).toISOString(),v:(2.5+2.5*Math.sin((i/240)*4*Math.PI-Math.PI/2)).toFixed(2)}));
  drawTideChart(pts);
}





// Boot
loadTides();
loadCurrents();
loadNWS();
</script>
